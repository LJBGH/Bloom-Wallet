basePath: /
definitions:
  model.ProjectContract:
    properties:
      amount:
        description: 金额
        type: string
      amountOfTokensToSell:
        description: 计划出售的代币数量
        type: string
      createTime:
        description: 创建时间
        type: string
      currentPrice:
        description: 当前价格
        type: integer
      decimals:
        description: 代币单位
        type: integer
      description:
        description: 项目说明
        type: string
      earningsWithdrawn:
        description: 是否提取收益
        type: boolean
      id:
        type: integer
      img:
        description: 项目图标
        type: string
      leftoverWithdrawn:
        description: 是否提取剩余代币
        type: boolean
      maxParticipation:
        description: 单人最大可购代币数量
        type: string
      name:
        description: 项目名称
        type: string
      numberOfRegistrations:
        description: 注册人数
        type: integer
      projectWebsite:
        description: 项目网站
        type: string
      registrationTimeEnds:
        description: 注册结束时间
        type: string
      registrationTimeStarts:
        description: 注册开始时间
        type: string
      saleContractAddress:
        description: 合约地址
        type: string
      saleEnd:
        description: 销售结束时间
        type: string
      saleStart:
        description: 销售开始时间
        type: string
      status:
        description: 状态
        type: integer
      symbol:
        description: 代币缩写
        type: string
      tge:
        description: 代币解锁时间
        type: string
      tokenAddress:
        description: 代币地址
        type: string
      tokenName:
        description: 代币名称
        type: string
      tokenPriceInPT:
        description: 代币价格
        type: string
      totalRaised:
        description: 筹集总额
        type: string
      totalTokensSold:
        description: 已卖出的代币数量
        type: string
      unlockTime:
        description: 用户可领取代币的最早时间
        type: string
      updateTime:
        description: 更新时间
        type: string
    type: object
  model.WalletAccount:
    properties:
      address:
        type: string
      index:
        type: integer
      mnemonic:
        description: 仅用于接口返回（wallet.json 的 accounts 节点不会写入）
        type: string
      name:
        type: string
      path:
        type: string
      privateKey:
        type: string
      publicKey:
        type: string
    type: object
  request.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  request.ProjectContractUpdateRequest:
    properties:
      id:
        type: integer
      paymentToken:
        type: string
      registrationEnd:
        type: string
      registrationStart:
        type: string
      saleAddress:
        type: string
      saleEndTime:
        type: string
      saleOwner:
        type: string
      saleStartTime:
        type: string
      saleToken:
        type: string
      tokenPriceInPT:
        type: string
      totalTokens:
        type: string
      unlockTime:
        type: string
    required:
    - id
    type: object
  response.WalletAccountResult:
    properties:
      address:
        type: string
      index:
        type: integer
      mnemonic:
        description: 仅用于接口返回（wallet.json 的 accounts 节点不会写入）
        type: string
      name:
        type: string
      path:
        type: string
      privateKey:
        type: string
      publicKey:
        type: string
    type: object
  response.WalletAccountsResult:
    properties:
      accounts:
        items:
          $ref: '#/definitions/model.WalletAccount'
        type: array
    type: object
  response.WalletResult:
    properties:
      address:
        description: 地址
        type: string
      mnemonic:
        description: 助记词
        type: string
      privateKey:
        description: 私钥
        type: string
      publicKey:
        description: 公钥
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: bloom-wallet 接口文档 认证方式：在 Authorize 中填写 "Bearer {token}"
  title: bloom-wallet
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 返回 token
      parameters:
      - description: 登录参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 登录
      tags:
      - auth
  /project/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取项目合约
      parameters:
      - description: 项目合约ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.ProjectContract'
      summary: 根据ID获取项目合约
      tags:
      - salecontract
    put:
      consumes:
      - application/json
      description: 更新项目合约
      parameters:
      - description: 项目合约ID
        in: path
        name: id
        required: true
        type: string
      - description: 项目合约更新参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/request.ProjectContractUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: 更新项目合约
      tags:
      - salecontract
  /project/all:
    get:
      consumes:
      - application/json
      description: 获取所有项目合约
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.ProjectContract'
            type: array
      summary: 获取所有项目合约
      tags:
      - salecontract
  /test/ping:
    get:
      description: 返回 pong
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: ping 测试
      tags:
      - ping
  /test/time:
    get:
      description: 返回当前服务器时间（RFC3339 格式）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: 获取当前时间
      tags:
      - api
  /wallet/account/all:
    get:
      description: 查看本地保存的全部账户列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletAccountsResult'
      security:
      - ApiKeyAuth: []
      summary: 查看所有账户
      tags:
      - wallet
  /wallet/account/current:
    get:
      description: 查看当前选中的账户
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletAccountResult'
      security:
      - ApiKeyAuth: []
      summary: 查看当前账户
      tags:
      - wallet
  /wallet/account/switch:
    get:
      description: 按 index 切换当前账户
      parameters:
      - description: 账户 index
        in: query
        name: index
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletAccountResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.WalletAccountResult'
      security:
      - ApiKeyAuth: []
      summary: 切换当前账户
      tags:
      - wallet
  /wallet/backup:
    get:
      description: 备份当前钱包信息（具体内容取决于实现）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletAccountResult'
      security:
      - ApiKeyAuth: []
      summary: 备份钱包
      tags:
      - wallet
  /wallet/create/mnemonic:
    get:
      description: 创建一个助记词
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletResult'
      security:
      - ApiKeyAuth: []
      summary: 创建助记词
      tags:
      - wallet
  /wallet/create/wallet:
    get:
      description: 创建一个钱包,如果有助记词根据助记词创建,否者创建一个新钱包并返回助记词/地址/密钥等信息
      parameters:
      - description: 助记词（空格分隔）；不传则自动生成
        in: query
        name: mnemonic
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletAccountResult'
      security:
      - ApiKeyAuth: []
      summary: 创建钱包
      tags:
      - wallet
  /wallet/import:
    post:
      consumes:
      - multipart/form-data
      description: 上传钱包 JSON 文件导入钱包并返回钱包信息
      parameters:
      - description: 钱包 JSON 文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.WalletResult'
      security:
      - ApiKeyAuth: []
      summary: 导入钱包
      tags:
      - wallet
  /wallet/restore:
    get:
      description: 从默认备份源恢复钱包（具体内容取决于实现）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletAccountResult'
      security:
      - ApiKeyAuth: []
      summary: 恢复钱包
      tags:
      - wallet
  /wallet/restore/mnemonic:
    get:
      description: 通过助记词恢复钱包并返回钱包信息
      parameters:
      - description: 助记词（空格分隔）
        in: query
        name: mnemonic
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletAccountResult'
      security:
      - ApiKeyAuth: []
      summary: 根据助记词恢复钱包
      tags:
      - wallet
  /wallet/restore/privateKey:
    get:
      description: 通过私钥恢复钱包并返回钱包信息
      parameters:
      - description: 私钥（hex 字符串）
        in: query
        name: privateKey
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.WalletAccountResult'
      security:
      - ApiKeyAuth: []
      summary: 根据私钥恢复钱包
      tags:
      - wallet
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
